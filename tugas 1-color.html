<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas Color 1</title>
    <style>
        .NamaWarna {
            color: maroon;
        }
        .rgb {
            color: rgb(7, 7, 77); /*Biru Tua*/
        }
        .rgba {
            color: rgba(8, 88, 8, 0.8) /*Hijau Tua*/
        }
        .hsl {
            color: hsl(6, 7%, 67%)/*Abu-Abu*/
        } 
        .hsla {
            color: hsla(99, 9%, 9%, 0.9)/*Hitam*/
        }
    </style>
  </body>
        <h1 class="NamaWarna">Contoh Nama Warna</h1>
        <h1 class="rgb">Contoh RGB</h1>
        <h1 class="rgba">Contoh RGBA</h1>
        <h1 class="hsl">Contoh HSL</h1>
        <h1 class="hsla">Contoh HSLA</h1>
</html>
