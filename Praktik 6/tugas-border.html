<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praktik Border 1</title>
    <style>
        p {
            font-family: Arial, Helvetica, sans-serif;
        }
        .solid {
            border: 3px solid yellow;
            padding: 10px;
            background-color: skyblue;
        }
        .dotted {
            border: 3px dotted purple;
            padding: 10px;
            background-color:lightsteelblue;
        }
        .double {
            border: 5px double gold;
            padding: 10px;
            background-color: silver ;
        }
        .dashed {
            border: 3px dashed black;
            padding: 10px;
            background-color: lightcyan;
        }
        .groove {
            border: 3px groove maroon;
            padding: 10px;
            background-color: yellow;
        }
        .ridge {
            border: 5px ridge green;
            padding: 10px;
            background-color: pink;
        }
    </style>
  </body>
        <h2>Contoh Border CSS</h2>
        <p class="solid">Ini border solid.</p>
        <p class="dotted">Ini border dotted.</p>
        <p class="double">Ini border double.</p>
        <p class="dashed">Ini border dashed.</p>
        <p class="groove">Ini border groove.</p>
        <p class="ridge">Ini border ridge.</p>
</html>
