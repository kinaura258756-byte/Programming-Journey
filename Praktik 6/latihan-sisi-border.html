    <title>Border Sisi Tertentu.</title>
    <style>
      body {
        font-family: sans-serif;

      header {

      }
      footer {
        border-top: 1px solid grey;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Latihan CSS Border untuk Sisi Tertentu</h1>
    </header>

    <article>
      Hello Ini adalah contoh latihan membuat garis di CSS pada sisi tertentu.
      Perhatikan elemen header di atas👆, kita memberikan garis sisi di bawahnya. 
      Lalu coba perhatikan elemen footer di bawah👇, kita memeberikan garis pada sisi 
      atas elemen.
