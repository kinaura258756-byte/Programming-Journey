<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contoh 6</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      .menu {
        background-color: #333;
        overflow: hidden;
      }
      .menu a {
        float: left;
        display: block;
        color: white;
        padding: 14px 20px;
        cursor: alias;
        text-decoration-line: none;
        transition: background-color 0.3s ease;
      }
      .menu a:hover {
        background-color: #4caf50;
        color: white;
      }
    </style>
  </head>
  <body>
    <h2>Contoh Menu Hover</h2>

    <div class="menu">
        <a href="#">Beranda</a>
        <a href="#">Tentang</a>
        <a href="#">layanan</a>
        <a href="#">Kontak</a>
    </div>
  </body>
</html>
