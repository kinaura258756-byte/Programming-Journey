<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Position</title>
    <style>
        div {
            width: 200px;
            height: 200px;
        }
        .satu {
            background-color: #4c3d19 ;
        }
        .dua {
            background-color: #354024 ;
            position: static;
        }
        .tiga {
            background-color: #889063 ;
        }
    </style>
</head>
<body>
    <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>


</body>
</html>
