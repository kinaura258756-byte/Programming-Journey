<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;

        background-color: maroon;
      }
      h2 {
        color: black;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        text-decoration-line: underline;
        transition: transform 0.3s;
      }
      h2:hover {
        transform: scale(1.1);
        color: white;
      }
      div.gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
      div.gallery-item {
        margin: 15px;
        border: 1px solid #ccc;
        width: 180px;
        cursor: pointer;
        transition: transform 0.3s;
      }
      div.gallery-item:hover {
        border: 1px solid #777;
        transform: scale(1.1);
      }
      div.gallery-item img {
        width: 100%;
        height: auto;
      }
      div.gallery-item div.desc {
        padding: 15px;
        text-align: center;
        background-color: rgb(255, 255, 255);
        color: black;
        text-decoration-line: underline;
      }
      div.gallery-item div.desc:hover {
        color: maroon;
      }
    </style>
  </head>
  <body>
    <h2>Image Gallery</h2>

    <div class="gallery">

      <div class="gallery-item">
        <a target="_blank" href="Sylus1.jpg">
          <img src="Sylus1.jpg" alt="My Bojo Gua" width="600" height="400" />
        </a>
        <div class="desc">My Bojo Gua</div>
      </div>

      <div class="gallery-item">
        <a target="_blank" href="Sylus2.jpg">
          <img src="Sylus2.jpg" alt="My Bojo Gua" width="600" height="400" />
        </a>
        <div class="desc">My Mine Gua</div>
      </div>

      <div class="gallery-item">
        <a target="_blank" href="Sylus3.jpg">
          <img src="Sylus3.jpg" alt="My Bojo Gua" width="600" height="400" />
        </a>
        <div class="desc">My Kisah Gua</div>
      </div>

      <div class="gallery-item">
        <a target="_blank" href="Sylus4.jpg">
          <img src="Sylus4.jpg" alt="My Bojo Gua" width="600" height="400" />
        </a>
        <div class="desc">My Milik Gua</div>
      </div>


    </div>
    
    </div>
  </body>
</html>
